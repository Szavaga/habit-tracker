<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
        }
        .form-control {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            color: white;
            padding: 12px 16px;
        }
        .form-control::placeholder { color: rgba(255,255,255,0.4); }
        .form-control:focus {
            background: rgba(255,255,255,0.12);
            border-color: rgba(99,179,237,0.6);
            color: white;
            box-shadow: 0 0 0 3px rgba(99,179,237,0.15);
        }
        .btn-register {
            background: linear-gradient(135deg, #28a745, #20c997);
            border: none;
            border-radius: 10px;
            color: white;
            padding: 12px;
            font-weight: 600;
            width: 100%;
        }
        .btn-register:hover { opacity: 0.85; color: white; }
        a { color: #667eea; }
    </style>
</head>
<body>
    <div class="card">
        <div class="text-center mb-4">
            <div style="font-size:2.5rem;">🎯</div>
            <h2 class="text-white fw-bold">Create account</h2>
            <p class="text-white-50">Start tracking your habits today</p>
        </div>
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form action="/register" method="post">
            <div class="mb-3">
                <input type="text" name="username" class="form-control" placeholder="Username" required>
            </div>
            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-register">
                <i class="fas fa-user-plus me-2"></i>Register
            </button>
        </form>
        <p class="text-center text-white-50 mt-3 mb-0">
            Already have an account? <a href="/login">Login</a>
        </p>
    </div>
</body>
</html>
